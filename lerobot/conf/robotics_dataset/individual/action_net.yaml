_target_: lerobot.common.datasets.data_config.LeRobotFourierGR1DataConfig

# Dataset identification
name: action_net
asset_id: action_net
repo_id: action_net
root_dir: <path_to_action_net_dataset>
validation_episodes: ${.root_dir}/meta/validation_episodes.json 

# Action configuration
action_sequence_keys: [action]
action_horizon: 10
action_offset: 0
action_sample_step: 2.5
state_dim: 26
control_mode: joint
map_to_unified_space: false
map_to_humanoid: true
# Base configuration
base_config:
  _target_: lerobot.common.datasets.data_config.DataConfig
  local_files_only: true
  prompt_from_task: true 