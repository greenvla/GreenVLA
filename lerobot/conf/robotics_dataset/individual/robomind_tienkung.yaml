_target_: lerobot.common.datasets.data_config.LeRobotRobomindTienkungDataConfig

# Dataset identification
name: robomind_tienkung
asset_id: robomind_tienkung
repo_id: robomind_tienkung
root_dir: <path_to_robomind_tienkung_dataset>
episodes_list_file: ${.root_dir}/filter/v1/filtered_episodes.json
validation_episodes: ${.root_dir}/meta/validation_episodes.json

# Action configuration
action_sequence_keys: [action]
action_horizon: 10
action_offset: 0
action_sample_step: 2.5
state_dim: 26
control_mode: joint
smooth_actions: true
map_to_unified_space: true
map_to_humanoid: true

# Base configuration
base_config:
  _target_: lerobot.common.datasets.data_config.DataConfig
  local_files_only: true
  prompt_from_task: true
